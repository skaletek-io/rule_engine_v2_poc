version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/platform/db/queries"
    schema: "internal/platform/db/migrations/sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/platform/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
